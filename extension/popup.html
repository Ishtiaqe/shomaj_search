<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shomaj Indexer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      padding: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(90deg, #6c63ff, #3ecfcf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1d2e;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3ecfcf;
      box-shadow: 0 0 6px #3ecfcf;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .status-text {
      font-size: 12px;
      color: #aaa;
    }

    .status-text strong {
      color: #e0e0e0;
    }

    .open-btn {
      display: block;
      width: 100%;
      padding: 9px;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .open-btn:hover { opacity: 0.85; }

    .footer {
      margin-top: 12px;
      font-size: 10px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">S</div>
    <span class="logo-text">Shomaj Indexer</span>
  </div>

  <div class="status-row">
    <div class="dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Checking backend…</span>
  </div>

  <a class="open-btn" href="http://localhost:8000" target="_blank" id="dashboardBtn">
    Open Search Dashboard
  </a>

  <div class="footer">Pages you visit are indexed privately.</div>

  <script>
    const statusText = document.getElementById("statusText");
    const statusDot  = document.getElementById("statusDot");

    async function checkBackend() {
      try {
        const r = await fetch("http://localhost:8000/health", { signal: AbortSignal.timeout(3000) });
        if (r.ok) {
          const data = await r.json();
          statusText.innerHTML = "<strong>Backend online</strong> — indexing active";
          statusDot.style.background = "#3ecfcf";
          statusDot.style.boxShadow  = "0 0 6px #3ecfcf";
        } else {
          throw new Error("non-ok");
        }
      } catch {
        statusText.innerHTML = "<strong>Backend offline</strong> — start server";
        statusDot.style.background = "#ff5f5f";
        statusDot.style.boxShadow  = "0 0 6px #ff5f5f";
      }
    }

    checkBackend();
  </script>
</body>
</html>
